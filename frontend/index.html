<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RouteRider</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap"/>
  <style>
    :root {
      --bg:#0d0f14; --panel:#13161e; --border:#1e2330;
      --accent:#3b82f6; --accent-light:#60a5fa;
      --text:#e2e8f0; --muted:#64748b;
      --danger:#ef4444; --success:#22c55e;
      --gz:#f59e0b;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden;}
    #sidebar{width:360px;min-width:360px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:10;overflow:hidden;}
    #sidebar-header{padding:20px 20px 16px;border-bottom:1px solid var(--border);}
    .logo{font-size:22px;font-weight:800;letter-spacing:-0.5px;}
    .logo span{color:var(--accent);}
    .tagline{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:1px;}
    #gz-section{padding:16px 20px;border-bottom:1px solid var(--border);background:rgba(245,158,11,.04);}
    .section-label{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;}
    .gz-label{color:var(--gz);}
    .search-wrapper{position:relative;}
    .search-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 40px 10px 12px;color:var(--text);font-family:'Syne',sans-serif;font-size:13px;outline:none;transition:border-color .2s;}
    .search-input::placeholder{color:var(--muted);}
    #gz-input:focus{border-color:var(--gz);}
    #stop-input:focus{border-color:var(--accent);}
    .search-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);border:none;border-radius:5px;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    #gz-search-btn{background:var(--gz);}
    #stop-search-btn{background:var(--accent);}
    #stop-search-btn:hover{background:var(--accent-light);}
    #gz-set-card{display:none;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--gz);border-radius:8px;padding:10px 12px;margin-top:8px;}
    .gz-badge{width:26px;height:26px;border-radius:50%;background:var(--gz);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
    .gz-info{flex:1;min-width:0;}
    .gz-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .gz-coords{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin-top:2px;}
    #gz-clear-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:2px 4px;border-radius:4px;}
    #gz-clear-btn:hover{color:var(--danger);}
    .dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--panel);border:1px solid var(--border);border-radius:8px;z-index:9999;max-height:220px;overflow-y:auto;display:none;}
    .dropdown-item{padding:10px 12px;font-size:12px;cursor:pointer;border-bottom:1px solid var(--border);}
    .dropdown-item:last-child{border-bottom:none;}
    .dropdown-item:hover{background:var(--bg);}
    .place-name{color:var(--text);font-weight:600;}
    .place-addr{color:var(--muted);font-size:11px;}
    #search-section{padding:16px 20px;border-bottom:1px solid var(--border);}
    #stops-section{flex:1;overflow-y:auto;padding:16px 20px;}
    #stops-section::-webkit-scrollbar{width:4px;}
    #stops-section::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
    .stops-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
    #clear-all-btn{font-family:'Space Mono',monospace;font-size:10px;color:var(--danger);background:none;border:1px solid var(--danger);border-radius:4px;padding:3px 8px;cursor:pointer;opacity:.7;}
    #clear-all-btn:hover{opacity:1;}
    #stops-list{display:flex;flex-direction:column;gap:8px;}
    .stop-item{display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;animation:slideIn .2s ease;}
    @keyframes slideIn{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
    .stop-badge{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;flex-shrink:0;color:white;}
    .stop-info{flex:1;min-width:0;}
    .stop-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .stop-coords{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin-top:2px;}
    .stop-remove{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:2px 4px;border-radius:4px;}
    .stop-remove:hover{color:var(--danger);background:rgba(239,68,68,.1);}
    .empty-state{text-align:center;padding:32px 16px;color:var(--muted);}
    .empty-state .icon{font-size:32px;margin-bottom:8px;}
    .empty-state p{font-size:12px;line-height:1.6;}
    #sidebar-footer{padding:16px 20px;border-top:1px solid var(--border);}
    #stats-bar{display:flex;gap:12px;margin-bottom:12px;}
    .stat{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 10px;text-align:center;}
    .stat-value{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:var(--accent);}
    .stat-label{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;}
    #compute-btn{width:100%;padding:13px;background:var(--accent);color:white;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:background .2s,opacity .2s;}
    #compute-btn:disabled{opacity:.4;cursor:not-allowed;}
    #compute-btn:not(:disabled):hover{background:var(--accent-light);}
    #nav-panel{display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px 20px;z-index:9999;min-width:340px;max-width:500px;box-shadow:0 8px 32px rgba(0,0,0,.5);}
    #nav-panel h3{font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;margin-bottom:6px;text-transform:uppercase;}
    #nav-stop-label{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:4px;}
    #nav-instruction{font-size:15px;font-weight:600;margin-bottom:12px;line-height:1.4;}
    #nav-controls{display:flex;gap:8px;}
    .nav-btn{flex:1;padding:10px;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;cursor:pointer;}
    #nav-prev{background:var(--border);color:var(--text);}
    #nav-next{background:var(--accent);color:white;}
    #nav-next:hover{background:var(--accent-light);}
    #map{flex:1;z-index:1;}
    #toast{position:fixed;bottom:24px;right:24px;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px 16px;font-size:13px;z-index:99999;opacity:0;transform:translateY(8px);transition:opacity .25s,transform .25s;pointer-events:none;max-width:280px;}
    #toast.show{opacity:1;transform:translateY(0);}
    #toast.error{border-color:var(--danger);color:var(--danger);}
    #toast.success{border-color:var(--success);color:var(--success);}
  </style>
</head>
<body>
<div id="sidebar">
  <div id="sidebar-header">
    <div class="logo">Route<span>Rider</span></div>
    <div class="tagline">Multi-stop delivery optimizer · Metro Manila</div>
  </div>
  <div id="gz-section">
    <div class="section-label gz-label">⊙ Ground Zero — Start Point</div>
    <div class="search-wrapper">
      <input type="text" id="gz-input" class="search-input" placeholder="Where are you starting from?" autocomplete="off"/>
      <button class="search-btn" id="gz-search-btn" title="Set start point">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="6"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <div class="dropdown" id="gz-dropdown"></div>
    </div>
    <div id="gz-set-card">
      <div class="gz-badge">⊙</div>
      <div class="gz-info">
        <div class="gz-name" id="gz-name-display"></div>
        <div class="gz-coords" id="gz-coords-display"></div>
      </div>
      <button id="gz-clear-btn" title="Change start point">✕</button>
    </div>
  </div>
  <div id="search-section">
    <div class="section-label">Add Delivery Stops</div>
    <div class="search-wrapper">
      <input type="text" id="stop-input" class="search-input" placeholder="Search place or address…" autocomplete="off"/>
      <button class="search-btn" id="stop-search-btn" title="Search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="6"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <div class="dropdown" id="stop-dropdown"></div>
    </div>
  </div>
  <div id="stops-section">
    <div class="stops-header">
      <div class="section-label" style="margin-bottom:0">Delivery Stops</div>
      <button id="clear-all-btn">Clear All</button>
    </div>
    <div id="stops-list">
      <div class="empty-state"><div class="icon">📦</div><p>Set your ground zero first,<br/>then add delivery stops.</p></div>
    </div>
  </div>
  <div id="sidebar-footer">
    <div id="stats-bar">
      <div class="stat"><div class="stat-value" id="stat-stops">0</div><div class="stat-label">Stops</div></div>
      <div class="stat"><div class="stat-value" id="stat-dist">—</div><div class="stat-label">km</div></div>
      <div class="stat"><div class="stat-value" id="stat-time">—</div><div class="stat-label">min</div></div>
    </div>
    <button id="compute-btn" disabled>Compute Optimal Route →</button>
  </div>
</div>
<div id="map"></div>
<div id="nav-panel">
  <h3 id="nav-header">Navigating</h3>
  <div id="nav-stop-label"></div>
  <div id="nav-instruction">Proceed to destination</div>
  <div id="nav-dist" style="font-family:'Space Mono',monospace;font-size:11px;color:var(--success);margin-bottom:12px;">Locating…</div>
  <div id="nav-controls">
    <button class="nav-btn" id="nav-prev">← Prev</button>
    <button class="nav-btn" id="nav-next">✓ Arrived</button>
  </div>
</div>
<div id="toast"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const BACKEND="http://127.0.0.1:5000";
const MAX_STOPS=9;
const DEFAULT_CENTER=[14.5547,121.0243];
const STOP_COLORS=['#AED6F1','#85C1E9','#5DADE2','#3498DB','#2E86C1','#2874A6','#1F618D','#1A5276','#154360'];
const ROUTE_COLOR='#1A5276';      // solid dark blue for all polylines
const GEOFENCE_RADIUS_M=80;       // auto-advance when rider is within 80m of next stop
let groundZero=null,gzMarker=null,stops=[],searchTimers={},routePolylines=[],currentSegment=0,routeData=null;
let gpsWatchId=null,riderMarker=null,riderAccuracyCircle=null,isNavigating=false;

const map=L.map('map',{center:DEFAULT_CENTER,zoom:14});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(map);
navigator.geolocation.getCurrentPosition(p=>map.setView([p.coords.latitude,p.coords.longitude],14),()=>{});

let toastTimer;
function showToast(msg,type='info'){const t=document.getElementById('toast');t.textContent=msg;t.className=`show ${type}`;clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.className='',3500);}

function createGZMarker(lat,lng){return L.marker([lat,lng],{icon:L.divIcon({className:'',html:`<div style="width:36px;height:36px;background:#f59e0b;border-radius:50%;border:3px solid white;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.5);font-size:16px">⊙</div>`,iconSize:[36,36],iconAnchor:[18,18],popupAnchor:[0,-20]})});}
function createStopMarker(lat,lng,i){const c=STOP_COLORS[i]||STOP_COLORS[8];return L.marker([lat,lng],{icon:L.divIcon({className:'',html:`<div style="width:32px;height:32px;background:${c};border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.4)"><span style="transform:rotate(45deg);font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:white">${i+1}</span></div>`,iconSize:[32,32],iconAnchor:[16,32],popupAnchor:[0,-34]})});}

function setGroundZero(name,lat,lng){
  if(gzMarker)gzMarker.remove();
  groundZero={name,lat,lng};
  gzMarker=createGZMarker(lat,lng);
  gzMarker.addTo(map).bindPopup(`<b>⊙ Start: ${name}</b>`);
  map.setView([lat,lng],15);
  document.getElementById('gz-input').style.display='none';
  document.getElementById('gz-search-btn').style.display='none';
  document.getElementById('gz-set-card').style.display='flex';
  document.getElementById('gz-name-display').textContent=name;
  document.getElementById('gz-coords-display').textContent=`${lat.toFixed(5)}, ${lng.toFixed(5)}`;
  updateComputeBtn();
  showToast(`Ground zero set: ${name}`,'success');
}

function clearGroundZero(){
  if(gzMarker){gzMarker.remove();gzMarker=null;}
  groundZero=null;
  document.getElementById('gz-input').style.display='';
  document.getElementById('gz-search-btn').style.display='';
  document.getElementById('gz-input').value='';
  document.getElementById('gz-set-card').style.display='none';
  clearPolylines();updateComputeBtn();
}
document.getElementById('gz-clear-btn').addEventListener('click',clearGroundZero);

function addStop(name,lat,lng){
  if(stops.length>=MAX_STOPS){showToast(`Max ${MAX_STOPS} stops`,'error');return;}
  if(stops.find(s=>Math.abs(s.lat-lat)<0.0001&&Math.abs(s.lng-lng)<0.0001)){showToast('Already added','error');return;}
  const i=stops.length;
  const marker=createStopMarker(lat,lng,i);
  marker.addTo(map).bindPopup(`<b>${i+1}. ${name}</b>`);
  stops.push({name,lat,lng,marker});
  renderStops();updateStats();fitMap();updateComputeBtn();
  showToast(`Stop ${i+1}: ${name}`,'success');
}

function removeStop(index){
  stops[index].marker.remove();stops.splice(index,1);
  stops.forEach((s,i)=>{s.marker.remove();s.marker=createStopMarker(s.lat,s.lng,i);s.marker.addTo(map).bindPopup(`<b>${i+1}. ${s.name}</b>`);});
  clearPolylines();renderStops();updateStats();
  if(stops.length||groundZero)fitMap();else map.setView(DEFAULT_CENTER,14);
  updateComputeBtn();
}

function clearAll(){stops.forEach(s=>s.marker.remove());stops=[];clearPolylines();renderStops();updateStats();document.getElementById('nav-panel').style.display='none';updateComputeBtn();}
function clearPolylines(){routePolylines.forEach(p=>p.remove());routePolylines=[];routeData=null;stopGPS();}
function updateComputeBtn(){document.getElementById('compute-btn').disabled=!groundZero||stops.length<1;}

function renderStops(){
  const list=document.getElementById('stops-list');
  if(!stops.length){list.innerHTML=`<div class="empty-state"><div class="icon">📦</div><p>Set your ground zero first,<br/>then add delivery stops.</p></div>`;return;}
  list.innerHTML=stops.map((s,i)=>`<div class="stop-item"><div class="stop-badge" style="background:${STOP_COLORS[i]}">${i+1}</div><div class="stop-info"><div class="stop-name" title="${s.name}">${s.name}</div><div class="stop-coords">${s.lat.toFixed(5)}, ${s.lng.toFixed(5)}</div></div><button class="stop-remove" onclick="removeStop(${i})">✕</button></div>`).join('');
}

function updateStats(){
  document.getElementById('stat-stops').textContent=stops.length;
  if(stops.length<1||!groundZero){document.getElementById('stat-dist').textContent='—';document.getElementById('stat-time').textContent='—';return;}
  if(routeData){document.getElementById('stat-dist').textContent=routeData.total_distance_km;document.getElementById('stat-time').textContent=routeData.total_duration_min;return;}
  const chain=[groundZero,...stops];let km=0;
  for(let i=0;i<chain.length-1;i++)km+=haversine(chain[i].lat,chain[i].lng,chain[i+1].lat,chain[i+1].lng);
  document.getElementById('stat-dist').textContent=km.toFixed(1);
  document.getElementById('stat-time').textContent=Math.round((km/25)*60);
}

function haversine(la1,lo1,la2,lo2){const R=6371,dLa=(la2-la1)*Math.PI/180,dLo=(lo2-lo1)*Math.PI/180,a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}

function fitMap(){
  const pts=[];
  if(groundZero)pts.push([groundZero.lat,groundZero.lng]);
  stops.forEach(s=>pts.push([s.lat,s.lng]));
  if(pts.length)map.fitBounds(L.latLngBounds(pts),{padding:[60,60]});
}

function setupSearch(inputId,btnId,dropdownId,onSelect){
  const input=document.getElementById(inputId),btn=document.getElementById(btnId),dd=document.getElementById(dropdownId);
  input.addEventListener('input',()=>{clearTimeout(searchTimers[inputId]);const q=input.value.trim();if(q.length<3){dd.style.display='none';return;}searchTimers[inputId]=setTimeout(()=>searchNominatim(q,dd,onSelect,input),400);});
  input.addEventListener('keydown',e=>{if(e.key==='Enter'){clearTimeout(searchTimers[inputId]);searchNominatim(input.value.trim(),dd,onSelect,input);}if(e.key==='Escape')dd.style.display='none';});
  btn.addEventListener('click',()=>{const q=input.value.trim();if(q.length>=3){clearTimeout(searchTimers[inputId]);searchNominatim(q,dd,onSelect,input);}});
}

document.addEventListener('click',e=>{if(!e.target.closest('.search-wrapper'))document.querySelectorAll('.dropdown').forEach(d=>d.style.display='none');});

async function searchNominatim(query,dd,onSelect,input){
  if(!query)return;
  const url=`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=5&countrycodes=ph`;
  try{
    const res=await fetch(url,{headers:{'Accept-Language':'en'}});
    const results=await res.json();
    if(!results.length){dd.innerHTML='<div class="dropdown-item"><span class="place-name">No results found</span></div>';dd.style.display='block';return;}
    dd.innerHTML=results.map(r=>`<div class="dropdown-item" data-lat="${r.lat}" data-lon="${r.lon}" data-name="${r.name||r.display_name.split(',')[0]}"><div class="place-name">${r.name||r.display_name.split(',')[0]}</div><div class="place-addr">${r.display_name}</div></div>`).join('');
    dd.style.display='block';
    dd.querySelectorAll('.dropdown-item').forEach(item=>item.addEventListener('click',()=>{onSelect(item.dataset.name,parseFloat(item.dataset.lat),parseFloat(item.dataset.lon));dd.style.display='none';input.value='';}));
  }catch{showToast('Search failed','error');}
}

setupSearch('gz-input','gz-search-btn','gz-dropdown',(name,lat,lng)=>setGroundZero(name,lat,lng));
setupSearch('stop-input','stop-search-btn','stop-dropdown',(name,lat,lng)=>addStop(name,lat,lng));
document.getElementById('clear-all-btn').addEventListener('click',clearAll);

document.getElementById('compute-btn').addEventListener('click',async()=>{
  if(!groundZero){showToast('Set a ground zero first','error');return;}
  const btn=document.getElementById('compute-btn');
  btn.textContent='Computing…';btn.disabled=true;clearPolylines();
  try{
    const res=await fetch(`${BACKEND}/optimize`,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ground_zero:{name:groundZero.name,lat:groundZero.lat,lng:groundZero.lng},stops:stops.map(s=>({name:s.name,lat:s.lat,lng:s.lng}))})});
    routeData=await res.json();
    if(routeData.error){showToast(routeData.error,'error');return;}
    routeData.segments.forEach((seg)=>{routePolylines.push(L.polyline(seg.polyline,{color:ROUTE_COLOR,weight:5,opacity:.85}).addTo(map));});
    stops=routeData.ordered_stops.map((s,i)=>{
      const old=stops.find(o=>o.name===s.name);
      if(old){old.marker.remove();old.marker=createStopMarker(s.lat,s.lng,i);old.marker.addTo(map).bindPopup(`<b>${i+1}. ${s.name}</b>`);}
      return{name:s.name,lat:s.lat,lng:s.lng,marker:old?old.marker:createStopMarker(s.lat,s.lng,i)};
    });
    renderStops();updateStats();fitMap();
    showToast('Route optimized! Starting live navigation…','success');
    currentSegment=0;showNavStep();
    document.getElementById('nav-panel').style.display='block';
    stopGPS();   // stop any previous watch
    startGPS();  // begin live tracking
  }catch(e){showToast('Cannot reach backend. Is main.py running?','error');console.error(e);}
  finally{btn.textContent='Compute Optimal Route →';updateComputeBtn();}
});

// ── GPS LIVE TRACKING ─────────────────────────
function startGPS(){
  if(!navigator.geolocation){showToast('Geolocation not supported on this device','error');return;}
  isNavigating=true;
  gpsWatchId=navigator.geolocation.watchPosition(onGPSUpdate,onGPSError,{
    enableHighAccuracy:true,
    maximumAge:3000,      // accept cached position up to 3s old
    timeout:10000
  });
}

function stopGPS(){
  if(gpsWatchId!==null){navigator.geolocation.clearWatch(gpsWatchId);gpsWatchId=null;}
  if(riderMarker){riderMarker.remove();riderMarker=null;}
  if(riderAccuracyCircle){riderAccuracyCircle.remove();riderAccuracyCircle=null;}
  isNavigating=false;
}

function onGPSUpdate(pos){
  const lat=pos.coords.latitude,lng=pos.coords.longitude,acc=pos.coords.accuracy;

  // Draw/update live rider dot
  if(!riderMarker){
    riderMarker=L.circleMarker([lat,lng],{radius:8,fillColor:'#22c55e',fillOpacity:1,color:'white',weight:2}).addTo(map);
    riderAccuracyCircle=L.circle([lat,lng],{radius:acc,color:'#22c55e',fillColor:'#22c55e',fillOpacity:.1,weight:1}).addTo(map);
  } else {
    riderMarker.setLatLng([lat,lng]);
    riderAccuracyCircle.setLatLng([lat,lng]).setRadius(acc);
  }

  // Keep map centered on rider during navigation
  map.panTo([lat,lng],{animate:true,duration:0.5});

  // ── GEOFENCE CHECK ──
  // Get the destination of the current segment
  if(!routeData||currentSegment>=routeData.segments.length)return;
  const dest=routeData.ordered_stops[currentSegment]; // current target stop
  const distToStop=haversine(lat,lng,dest.lat,dest.lng)*1000; // convert km→m

  // Update distance display in nav HUD
  document.getElementById('nav-dist').textContent=distToStop<1000
    ?`${Math.round(distToStop)}m away`
    :`${(distToStop/1000).toFixed(1)}km away`;

  // Auto-advance if within geofence radius
  if(distToStop<=GEOFENCE_RADIUS_M){
    showToast(`📍 Arrived at ${dest.name}!`,'success');
    advanceSegment();
  }
}

function onGPSError(err){
  showToast('GPS signal lost. Use button to advance manually.','error');
}

function advanceSegment(){
  if(!routeData)return;
  if(currentSegment>=routeData.segments.length-1){
    stopGPS();
    document.getElementById('nav-panel').style.display='none';
    showToast('🏁 All deliveries complete!','success');
    return;
  }
  currentSegment++;
  showNavStep();
}

// ── NAV HUD ───────────────────────────────────
function showNavStep(){
  if(!routeData)return;
  const segs=routeData.segments,seg=segs[currentSegment];
  const isLast=currentSegment===segs.length-1;

  document.getElementById('nav-header').textContent=currentSegment===0?'🚀 Starting Route':`Segment ${currentSegment+1} of ${segs.length}`;
  document.getElementById('nav-stop-label').textContent=`${seg.from} → ${seg.to}`;

  // Show first meaningful turn instruction
  const step=seg.steps.find(s=>s.road)||seg.steps[0];
  document.getElementById('nav-instruction').textContent=step&&step.road
    ?`${step.instruction} on ${step.road}`
    :'Proceed to destination';

  document.getElementById('nav-dist').textContent='Locating…';
  document.getElementById('nav-prev').disabled=currentSegment===0;
  document.getElementById('nav-next').textContent=isLast?'🏁 Done':'✓ Arrived';

  // Highlight active segment — others dimmed
  routePolylines.forEach((p,i)=>p.setStyle({
    opacity:i===currentSegment?1:.2,
    weight:i===currentSegment?7:4
  }));
  map.fitBounds(routePolylines[currentSegment].getBounds(),{padding:[80,80]});
}

document.getElementById('nav-next').addEventListener('click',()=>{
  advanceSegment(); // manual fallback button
});
document.getElementById('nav-prev').addEventListener('click',()=>{
  if(currentSegment>0){currentSegment--;showNavStep();}
});
</script>
